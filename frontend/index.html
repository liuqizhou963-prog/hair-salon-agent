<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>恒艺美发</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #eef7fc;
      --paper: #fffaf7;
      --card: #ffffff;
      --ink: #201c1a;
      --muted: #736760;
      --soft: #f2ebe6;
      --line: #eadfd8;
      --blue: #73b2e1;
      --blue-2: #4f96ce;
      --lime: #edff57;
      --brand: #4f96ce;
      --brand-2: #2f79b4;
      --teal: #1f746b;
      --teal-2: #124f4a;
      --gold: #b9862f;
      --plum: #5a4b87;
      --danger: #b42318;
      --warn-bg: #fff7ed;
      --warn-border: #f5c57a;
      --shadow: 0 16px 42px rgba(79,50,30,.13);
      --nav-h: 72px;
      color-scheme: light;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 0%, rgba(115,178,225,.24), transparent 32%),
        radial-gradient(circle at 90% 12%, rgba(237,255,87,.18), transparent 28%),
        var(--bg);
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; touch-action: manipulation; }
    button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 3px solid rgba(29,117,109,.22);
      outline-offset: 2px;
    }

    .app {
      width: min(430px, 100%);
      min-height: 100dvh;
      margin: 0 auto;
      padding-bottom: var(--nav-h);
      background: var(--paper);
      box-shadow: 0 0 0 1px rgba(0,0,0,.03), 0 24px 80px rgba(31,36,35,.18);
      position: relative;
    }

    .status {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(14px);
    }
    .topbar {
      min-height: 58px;
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: rgba(255,250,247,.9);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    .top-title { text-align: center; }
    .top-title strong { display: block; font-size: 15px; }
    .top-title span { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; }
    .icon-btn {
      width: 44px; height: 44px;
      display: grid; place-items: center;
      border-radius: 14px;
      color: var(--teal);
      background: var(--soft);
    }
    .icon-btn svg, .tab svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }

    main { min-height: calc(100dvh - var(--nav-h) - 90px); padding: 16px 16px 24px; }

    .screen { display: none; animation: enter .18s ease-out; }
    .screen.active { display: block; }
    @keyframes enter { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ---- layout helpers ---- */
    .grid { display: grid; gap: 12px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .row { display: flex; gap: 10px; align-items: center; }
    .spread { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .section { margin-top: 20px; }
    .section > h2 { margin: 0 0 12px; font-size: 17px; }

    /* ---- cards & lists ---- */
    .card { border: 1px solid var(--line); border-radius: 16px; background: var(--card); box-shadow: 0 8px 24px rgba(77,51,32,.08); overflow: hidden; }
    .pad { padding: 16px; }
    .list { display: grid; gap: 10px; }
    .list-item {
      display: flex; gap: 12px; align-items: center;
      padding: 14px; text-align: left; color: var(--ink);
      border: 1px solid var(--line); border-radius: 16px;
      background: white; box-shadow: 0 4px 14px rgba(77,51,32,.06);
    }
    .line-item {
      width: 100%; min-height: 52px;
      display: grid; grid-template-columns: 1fr auto;
      align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--line);
      color: var(--ink); text-align: left; background: transparent;
    }
    button.line-item { border-radius: 0; appearance: none; -webkit-appearance: none; }
    .line-item:last-child { border-bottom: 0; }
    .line-item strong { display: block; font-size: 15px; line-height: 1.3; }

    .appointment-mini-card {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      box-shadow: 0 6px 18px rgba(77,51,32,.07);
    }
    .appointment-avatar {
      width: 58px;
      height: 58px;
      overflow: hidden;
      border-radius: 16px;
      background: #edf2f0;
    }
    .appointment-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }
    .appointment-info {
      min-width: 0;
      display: grid;
      gap: 4px;
    }
    .appointment-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      font-weight: 900;
    }
    .appointment-time {
      color: var(--teal);
      font-size: 13px;
      font-weight: 900;
    }

    .title { margin: 0 0 4px; font-size: 16px; line-height: 1.35; }
    .meta { color: var(--muted); font-size: 13px; line-height: 1.55; }
    .price { color: var(--brand); font-weight: 900; }

    /* ---- pills & badges ---- */
    .pill {
      min-height: 26px; display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 999px;
      color: var(--teal); background: #e2f1ed;
      font-size: 12px; font-weight: 800; white-space: nowrap;
    }
    .pill.warn { color: var(--brand-2); background: #f7e5dc; }
    .pill.danger { color: white; background: var(--danger); }
    .pill.gold { color: #7a5210; background: #fef3c7; }
    .pill.dark { color: white; background: var(--teal); }
    .pill.purple { color: white; background: var(--plum); }

    /* ---- buttons ---- */
    .btn {
      min-height: 46px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 10px 14px; border-radius: 10px;
      color: var(--ink); background: var(--lime);
      box-shadow: 0 12px 24px rgba(54,83,32,.16);
      font-weight: 900; font-size: 15px;
      transition: transform .1s, opacity .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn.secondary { color: var(--blue-2); background: #eaf6fd; box-shadow: none; }
    .btn.ghost { color: var(--ink); background: #f5f0e8; }
    .btn.small { min-height: 34px; width: auto; padding: 6px 12px; font-size: 13px; }
    .btn.teal { color: white; background: linear-gradient(135deg, var(--teal), var(--teal-2)); }

    /* ---- nav card ---- */
    .nav-card {
      min-height: 100px; display: grid; align-content: space-between; gap: 6px;
      padding: 14px; text-align: left; color: var(--ink);
      background: white; border: 1px solid var(--line);
      border-radius: 16px; box-shadow: 0 6px 18px rgba(77,51,32,.07);
    }
    .nav-card strong { display: block; font-size: 22px; font-weight: 900; }
    .nav-card span { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .nav-card.teal { color: white; background: linear-gradient(135deg, var(--teal), var(--teal-2)); border-color: transparent; }
    .nav-card.teal span { color: rgba(255,255,255,.8); }
    .nav-card.brand { color: white; background: linear-gradient(135deg, var(--brand), var(--brand-2)); border-color: transparent; }
    .nav-card.brand span { color: rgba(255,255,255,.8); }

    /* ---- avatar ---- */
    .avatar {
      width: 40px; height: 40px; flex: 0 0 auto;
      display: grid; place-items: center;
      border-radius: 12px; color: white; background: var(--plum);
      font-size: 13px; font-weight: 900;
    }
    .avatar.lg { width: 64px; height: 64px; border-radius: 20px; font-size: 18px; }

    /* ---- stylist profile cards ---- */
    .stylist-card-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .stylist-profile-card {
      display: grid;
      gap: 9px;
      padding: 8px 8px 10px;
      border: 1px solid rgba(234,223,216,.82);
      border-radius: 20px;
      background: rgba(255,255,255,.96);
      box-shadow: 0 10px 24px rgba(77,51,32,.09);
    }
    .stylist-profile-card.selected {
      border-color: rgba(31,116,107,.34);
      box-shadow: 0 16px 38px rgba(31,116,107,.14);
    }
    .stylist-card-main {
      display: grid;
      gap: 9px;
      padding: 0;
      color: var(--ink);
      background: transparent;
      text-align: left;
    }
    .stylist-photo-wrap {
      width: 100%;
      aspect-ratio: 1 / 1.04;
      overflow: hidden;
      border-radius: 16px;
      background: #edf2f0;
    }
    .stylist-photo {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
    }
    .stylist-profile-body {
      display: grid;
      gap: 5px;
      padding: 0 2px;
    }
    .stylist-name-row {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }
    .stylist-display-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 900;
    }
    .verified-badge {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: #31c95c;
      box-shadow: 0 4px 10px rgba(49,201,92,.28);
    }
    .verified-badge svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      stroke-width: 3;
      fill: none;
    }
    .stylist-bio {
      min-height: 42px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .stylist-card-foot {
      display: grid;
      gap: 8px;
      padding: 0 2px;
    }
    .stylist-stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .stylist-stat {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .stylist-stat svg {
      width: 15px;
      height: 15px;
      stroke: #9b9b9b;
      stroke-width: 2;
      fill: none;
    }
    .follow-btn {
      min-height: 40px;
      width: 100%;
      flex: 0 0 auto;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--ink);
      background: #f7f4f0;
      box-shadow: inset 0 0 0 1px rgba(234,223,216,.62), 0 8px 18px rgba(77,51,32,.08);
      font-size: 12px;
      font-weight: 900;
    }
    .follow-btn.active {
      color: white;
      background: linear-gradient(135deg, var(--teal), var(--teal-2));
      box-shadow: 0 10px 18px rgba(31,116,107,.18);
    }
    @media (max-width: 390px) {
      .stylist-card-list { gap: 9px; }
      .stylist-profile-card { border-radius: 18px; padding: 7px 7px 9px; }
      .stylist-photo-wrap { border-radius: 15px; }
      .stylist-display-name { font-size: 14px; }
      .stylist-bio { font-size: 11px; }
    }

    /* ---- inputs ---- */
    input, textarea, select {
      width: 100%; min-height: 46px;
      border: 1px solid var(--line); border-radius: 10px;
      padding: 10px 13px; color: var(--ink); background: white;
      font-size: 15px;
    }
    textarea { resize: vertical; min-height: 88px; }

    /* ---- bottom nav ---- */
    .bottom-nav {
      position: fixed; left: 50%; bottom: 0;
      width: min(430px, 100%); height: var(--nav-h);
      transform: translateX(-50%);
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      background: rgba(255,255,255,.96);
      border-top: 1px solid var(--line);
      box-shadow: 0 -10px 28px rgba(77,51,32,.1);
      z-index: 20;
    }
    .tab {
      display: grid; justify-items: center; align-content: center; gap: 4px;
      color: #87908b; background: transparent;
      font-size: 11px; font-weight: 800;
    }
    .tab.active { color: var(--brand); }

    /* ---- wallet hero ---- */
    .wallet-hero {
      margin: -16px -16px 0;
      padding: 24px 20px 44px;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.22), transparent 26%),
        linear-gradient(180deg, #78b7e7 0%, #67a7d8 100%);
      color: white;
      position: relative;
      overflow: hidden;
    }
    .wallet-hero::after {
      content: "";
      position: absolute;
      right: -36px;
      bottom: -58px;
      width: 210px;
      height: 150px;
      border-radius: 56% 56% 38% 38%;
      background:
        radial-gradient(ellipse at 26% 20%, rgba(255,255,255,.96), transparent 32%),
        repeating-linear-gradient(100deg, rgba(255,255,255,.45) 0 4px, rgba(191,206,210,.22) 5px 9px),
        linear-gradient(145deg, #f7f8f3, #bfc7c9 55%, #f6f4ed);
      opacity: .72;
    }
    .wallet-hero > * { position: relative; z-index: 1; }
    .wallet-hero .meta { color: rgba(255,255,255,.75); }
    .wallet-hero .balance { font-size: 44px; font-weight: 900; letter-spacing: -1px; line-height: 1; margin: 8px 0 4px; }
    .wallet-hero .sub { font-size: 13px; color: rgba(255,255,255,.8); }
    .wallet-actions {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px;
      margin: 12px 0 0;
      position: relative;
      z-index: 2;
    }
    .wallet-action-btn {
      display: grid; justify-items: center; gap: 6px;
      min-height: 76px;
      padding: 12px 6px 10px;
      border: 1px solid var(--line); border-radius: 16px;
      background: white; color: var(--ink);
      box-shadow: 0 6px 16px rgba(77,51,32,.08);
      font-size: 12px; font-weight: 800;
    }
    .wallet-action-btn svg { width: 21px; height: 21px; stroke: var(--teal); stroke-width: 2; fill: none; }

    /* ---- blue mini-program system ---- */
    .page-hero {
      margin: -16px -16px 18px;
      padding: 22px 20px 26px;
      color: white;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.2), transparent 24%),
        linear-gradient(180deg, #78b7e7 0%, #67a7d8 100%);
      position: relative;
      overflow: hidden;
    }
    .page-hero::after {
      content: "";
      position: absolute;
      right: -34px;
      bottom: -62px;
      width: 220px;
      height: 142px;
      border-radius: 56% 56% 38% 38%;
      background:
        radial-gradient(ellipse at 26% 20%, rgba(255,255,255,.96), transparent 32%),
        radial-gradient(ellipse at 70% 12%, rgba(255,255,255,.72), transparent 27%),
        repeating-linear-gradient(100deg, rgba(255,255,255,.48) 0 4px, rgba(191,206,210,.24) 5px 9px),
        linear-gradient(145deg, #f7f8f3, #bfc7c9 55%, #f6f4ed);
      opacity: .78;
    }
    .page-hero > * { position: relative; z-index: 1; }
    .hero-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 900;
      color: rgba(255,255,255,.92);
    }
    .hair-logo {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--lime);
      border-left-color: transparent;
      transform: rotate(-28deg);
      position: relative;
    }
    .hair-logo::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 12px;
      width: 18px;
      height: 8px;
      border-top: 2px solid var(--lime);
      border-radius: 50%;
      transform: rotate(-18deg);
    }
    .hero-title {
      margin: 18px 0 8px;
      font-size: 38px;
      line-height: .98;
      letter-spacing: 0;
      font-weight: 600;
    }
    .hero-copy-small {
      max-width: 255px;
      color: rgba(255,255,255,.78);
      font-size: 14px;
      line-height: 1.45;
    }
    .hero-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }
    .hero-primary,
    .hero-secondary {
      min-height: 48px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 900;
    }
    .hero-primary { color: var(--ink); background: var(--lime); }
    .hero-secondary { color: white; background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.38); }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .section-head h2 { margin: 0; font-size: 18px; }
    .metric-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: white;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(77,51,32,.08);
    }
    .metric-cell { padding: 16px; border-right: 1px solid var(--line); }
    .metric-cell:last-child { border-right: 0; }
    button.metric-cell {
      display: block;
      width: 100%;
      color: inherit;
      background: transparent;
      text-align: left;
    }
    .metric-cell span { display:block; color: var(--muted); font-size: 12px; font-weight: 700; }
    .metric-cell strong { display:block; margin-top: 6px; color: var(--brand); font-size: 24px; line-height: 1; }
    .booking-panel {
      margin: -16px -16px 0;
      padding: 0 16px 24px;
    }
    .slot-date-section {
      display: grid;
      gap: 10px;
    }
    .slot-date-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-top: 4px;
    }
    .slot-date-head strong { font-size: 15px; }
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .slot-card {
      min-height: 92px;
      display: grid;
      align-content: center;
      justify-items: start;
      gap: 5px;
      padding: 13px;
      text-align: left;
      color: var(--ink);
      background: #fff8f0;
      border: 1px solid #f2d7bd;
      border-radius: 16px;
      box-shadow: 0 6px 16px rgba(77,51,32,.06);
    }
    .slot-card.afternoon {
      background: #eaf7f4;
      border-color: #b7d7d0;
    }
    .slot-card.evening {
      background: #f1efff;
      border-color: #d7d3ef;
    }
    .slot-period { color: var(--muted); font-size: 12px; font-weight: 800; }
    .slot-time { color: var(--ink); font-size: 22px; line-height: 1; font-weight: 900; }
    .slot-note {
      min-height: 22px;
      padding: 3px 8px;
      border-radius: 999px;
      color: var(--teal);
      background: rgba(255,255,255,.76);
      font-size: 11px;
      font-weight: 900;
    }

    /* ---- history timeline ---- */
    .visit-item {
      display: grid; grid-template-columns: 44px 1fr; gap: 10px; align-items: start;
    }
    .visit-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--teal); margin: 5px auto 0;
      position: relative;
    }
    .visit-dot::after {
      content: ""; position: absolute; top: 10px; left: 50%;
      width: 2px; height: calc(100% + 12px);
      transform: translateX(-50%);
      background: var(--line);
    }

    /* ---- empty state ---- */
    .empty {
      text-align: center; padding: 40px 20px; color: var(--muted);
    }
    .empty svg { width: 48px; height: 48px; stroke: var(--line); stroke-width: 1.5; fill: none; margin-bottom: 12px; }

    /* ---- amount grid for recharge ---- */
    .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .amount-btn {
      min-height: 70px; display: grid; align-content: center; gap: 3px;
      padding: 12px; text-align: center;
      border: 2px solid var(--line); border-radius: 10px;
      background: white; color: var(--ink);
      transition: border-color .12s, background .12s;
    }
    .amount-btn strong { font-size: 20px; font-weight: 900; }
    .amount-btn span { font-size: 12px; color: var(--muted); }
    .amount-btn.selected { border-color: var(--brand); background: #fdf0ee; }
    .amount-btn.selected span { color: var(--brand); }

    @media (min-width: 760px) {
      body { padding: 24px 0; }
      .app { min-height: calc(100dvh - 48px); border-radius: 28px; }
      .bottom-nav { border-radius: 0 0 28px 28px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="status"><span>9:41</span><span>82%</span></div>
  <header class="topbar">
    <button class="icon-btn" id="backBtn" aria-label="返回"></button>
    <div class="top-title">
      <strong id="pageTitle">我的</strong>
    </div>

async function apiPost(path, body) {
  const r = await fetch(API_BASE + path, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });

  return r.json();
}

function statusText(status) {
  return ({ confirmed:"已预约", pending:"待确认", completed:"已完成", cancelled:"已取消" }[status] || status);

function findStylistForAppointment(appointment) {
  return state.stylists.find(s => (
    appointment.stylist_id && s.stylist_id === appointment.stylist_id
  ) || (
    appointment.stylist_name && appointment.stylist_name.includes(s.name)
  ));
}

function formatAppointmentTime(value) {
  if (!value) return "时间待确认";
  const normalized = String(value).replace("T", " ").slice(0, 16);
  const [datePart, timePart = ""] = normalized.split(" ");
  return `${formatSlotDate(datePart)} ${timePart}`.trim();
}

      <div class="slot-date-head">
        <strong>${esc(formatSlotDate(date))}</strong>
        <span class="meta">${slots.length} 个时间段可选</span>
      </div>
      <div class="slot-grid">
        ${slots.map(slot => {
          const hour = Number(slot.time.slice(0, 2));
          const tone = hour >= 17 ? "evening" : hour >= 12 ? "afternoon" : "morning";
          const period = hour >= 17 ? "傍晚" : hour >= 12 ? "午后" : "上午";
          return `
            <button class="slot-card ${tone}" data-book-slot="${esc(slot.slot_id)}">
              <span class="slot-period">${period}</span>
              <span class="slot-time">${esc(slot.time)}</span>
              <span class="slot-note">可预约</span>
            </button>`;
        }).join("")}
      </div>
    </div>`).join("");
}

function formatSlotDate(dateText) {
  const d = new Date(`${dateText}T00:00:00`);
  if (Number.isNaN(d.getTime())) return dateText;
  const week = ["周日","周一","周二","周三","周四","周五","周六"][d.getDay()];
  return `${dateText.slice(5)} ${week}`;
}

async function loadAppointments() {
  state.appointmentsLoading = false;
  state.appointments = [];
  rerenderAppointments();
}

function rerenderAppointments() {
  const el = document.querySelector("#appointmentList");
  if (el) el.innerHTML = appointmentListHtml();
}

async function loadStylists() {
  state.stylistsLoading = true;
  rerenderBooking();
  state.stylists = stylistProfiles;
  state.stylistsLoading = false;
  rerenderBooking();
  if (state.selectedStylistId) loadSlots(state.selectedStylistId);
}

async function loadSlots(stylistId) {
  state.slotsLoading = true;
  rerenderSlots();
  state.slots = (demoSlotsByStylist[stylistId] || demoSlotsByStylist[stylistProfiles[0].stylist_id]).map(slot => ({
    ...slot,
    datetime_str: `${slot.date} ${slot.time}`
  }));
  state.slotsLoading = false;
  rerenderSlots();
}

function rerenderBooking() {
  const screen = document.querySelector('[data-screen="booking"]');
  if (screen?.classList.contains("active")) screen.innerHTML = bookingPage();
}

function rerenderSlots() {
  const el = document.querySelector("#slotList");
  if (el) el.innerHTML = slotListHtml();
}

async function bookSlot(slotId) {
  const stylist = state.stylists.find(s => s.stylist_id === state.selectedStylistId);
  if (!stylist) return;
  if (slotId.startsWith("demo-")) {
    const slot = state.slots.find(item => item.slot_id === slotId);
    state.demoAppointments.unshift({
      appointment_id: `${slotId}-${Date.now()}`,
      stylist_id: stylist.stylist_id,
      stylist_name: stylist.displayName,
      service: "洗剪吹",
      appointment_datetime: slot ? `${slot.date} ${slot.time}` : "",
      status: "confirmed"
    });
    alert(`已预约 ${stylist.name} 老师`);
    go("mine");
    return;
  }
  try {
    await apiPost("/api/appointments", {
      phone: state.user.phone,
      name: state.user.name,
      stylist_id: stylist.stylist_id,
      slot_id: slotId,
      service: "洗剪吹",
      notes: "客户从会员端预约"
    });
    alert(`已预约 ${stylist.name} 老师`);
    await Promise.allSettled([loadAppointments(), loadSlots(stylist.stylist_id)]);
    go("mine");
  } catch (e) {
    alert("预约失败，请换一个时间再试");
  }
}

// =========================================================
// PAGE REGISTRY
// =========================================================
const pages = {
  mine:          { tab:"mine",  title:"我的",     html: minePage },
  recharge:      { tab:"mine",  title:"充值",      html: rechargePage },
  refund:        { tab:"mine",  title:"余额退款",  html: refundPage },
  rechargeOk:    { tab:"mine",  title:"充值成功",  html: () => successPage("充值成功", `￥${state.selectedAmount}.00 已到账`, "mine") },
  points:        { tab:"mine",  title:"我的积分",  html: pointsPage },
  history:       { tab:"mine",  title:"到店记录",  html: historyPage },
  profile:       { tab:"mine",  title:"个人资料",  html: profilePage },
  push:          { tab:"mine",  title:"推送通知",  html: pushPage },
  privacy:       { tab:"mine",  title:"隐私政策",  html: privacyPage },
  booking:       { tab:"booking", title:"预约",     html: bookingPage },
  teacherSchedule: { tab:"booking", title:"老师排档", html: teacherSchedulePage },
};

// =========================================================
// ROUTER
// =========================================================
const root = document.querySelector("#screenRoot");
const titleEl = document.querySelector("#pageTitle");
const backBtn = document.querySelector("#backBtn");
const stack = [];

function go(id, push = true) {
  if (!pages[id]) return;
  const cur = document.querySelector(".screen.active")?.dataset.screen;
  if (push && cur && cur !== id) stack.push(cur);

  // render fresh HTML into the screen container
  let screen = document.querySelector(`[data-screen="${id}"]`);
  if (!screen) {
    screen = document.createElement("section");
    screen.className = "screen";
    screen.dataset.screen = id;
    root.appendChild(screen);
  }
  // always re-render so data-driven pages stay fresh
  screen.innerHTML = pages[id].html();

  document.querySelectorAll(".screen").forEach(s => s.classList.toggle("active", s.dataset.screen === id));
  titleEl.textContent = pages[id].title;
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === pages[id].tab));
  backBtn.innerHTML = stack.length ? svg.back : "";
  window.scrollTo({ top:0, behavior:"instant" });

  // page-specific wiring
  if (id === "mine") loadAppointments();
  if (id === "booking" && !state.stylists.length && !state.stylistsLoading) loadStylists();
  if (id === "teacherSchedule" && state.selectedStylistId) loadSlots(state.selectedStylistId);
  if (id === "recharge") wireRecharge();
  if (id === "refund") wireRefund();
}

function wireRecharge() {
  document.querySelectorAll(".amount-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.selectedAmount = Number(btn.dataset.amount);
      document.querySelectorAll(".amount-btn").forEach(b => b.classList.toggle("selected", Number(b.dataset.amount) === state.selectedAmount));
      document.querySelector("#rechargeBtn").textContent = `确认充值 ￥${state.selectedAmount}`;
    });
  });
  document.querySelector("#rechargeBtn")?.addEventListener("click", async () => {
    const custom = document.querySelector("#customAmount")?.value;
    const amount = custom ? Number(custom) : state.selectedAmount;
    if (!amount || amount < 1) return;
    state.user.balance += amount;
    go("rechargeOk");
  });
}

function wireRefund() {
  document.querySelector("#refundBtn")?.addEventListener("click", () => {
    const amount = Number(document.querySelector("#refundAmount")?.value || 0);
    if (!amount || amount < 1 || amount > state.user.balance) {
      alert("请输入有效退款金额");
      return;
    }
    state.user.balance = Math.max(0, state.user.balance - amount);
    alert("退款申请已提交");
    go("mine");
  });
}

// global click delegation for data-go
document.addEventListener("click", e => {
  const btn = e.target.closest("[data-go]");
  if (btn) go(btn.dataset.go);
});
document.addEventListener("click", e => {
  const prefer = e.target.closest("[data-prefer-stylist]");
  if (prefer) {
    state.selectedStylistId = prefer.dataset.preferStylist;
    localStorage.setItem("preferredStylistId", state.selectedStylistId);
    state.slots = [];
    state.slotsLoading = true;
    go("teacherSchedule");
    return;
  }

  const select = e.target.closest("[data-select-stylist]");
  if (select) {
    state.selectedStylistId = select.dataset.selectStylist;
    state.slots = [];
    state.slotsLoading = true;
    go("teacherSchedule");
    return;
  }

  const toggle = e.target.closest("#togglePreferredOnly");
  if (toggle && state.selectedStylistId) {
    state.preferredOnly = !state.preferredOnly;
    localStorage.setItem("preferredOnly", String(state.preferredOnly));
    rerenderBooking();
    return;
  }

  const slot = e.target.closest("[data-book-slot]");
  if (slot) bookSlot(slot.dataset.bookSlot);
});
backBtn.addEventListener("click", () => {
  if (stack.length) go(stack.pop(), false);
  else go("mine", false);
});

// =========================================================
// BOOT
// =========================================================
function boot() {
  // seed initial screens so they exist in DOM
  Object.keys(pages).forEach(id => {
    const s = document.createElement("section");
    s.className = "screen"; s.dataset.screen = id;
    s.innerHTML = pages[id].html();
    root.appendChild(s);
  });
  const params = new URLSearchParams(window.location.search);
  const initialPage = pages[params.get("page")] ? params.get("page") : "mine";
  if (params.get("preferred") === "1") {
    state.preferredOnly = true;
    localStorage.setItem("preferredOnly", "true");
  }
  go(initialPage, false);

  // wire nav icons
  const navBooking = document.querySelector('[data-tab="booking"]');
  const navMine = document.querySelector('[data-tab="mine"]');
  if (navBooking) navBooking.innerHTML = svg.calendar + "<span>预约</span>";
  if (navMine) navMine.innerHTML = svg.user + "<span>我的</span>";
}

boot();

</script>

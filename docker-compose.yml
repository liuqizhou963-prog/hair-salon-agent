services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salon
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
    volumes:
      - salon-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon -d salon"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://salon:salon@db:5432/salon
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?Set AUTH_SECRET_KEY before starting}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8000}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-60}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  salon-postgres: